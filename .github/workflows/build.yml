name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies and Theos
      run: |
        brew install ldid dpkg
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip -q master.zip -d ~/theos/sdks/
        mv ~/theos/sdks/sdks-master/*.sdk ~/theos/sdks/
        rm -rf master.zip ~/theos/sdks/sdks-master
        
    - name: Build Tweak
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        make clean
        make package FINALPACKAGE=1
        
    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: HideMyTab-Package
        path: packages/*.deb
        
    - name: Extract dylib
      run: |
        mkdir -p output
        dpkg-deb -x packages/*.deb extracted/
        find extracted/ -name "*.dylib" -exec cp {} output/ \;
        ls -la output/
        
    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: HideMyTab-dylib
        path: output/*.dylib
